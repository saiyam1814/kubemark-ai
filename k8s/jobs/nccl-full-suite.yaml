apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-fs-${SHORT_ID}
  namespace: ${NAMESPACE}
  labels:
    app: kubemark-ai
    benchmark: nccl
    test: full-suite
    run-id: "${RUN_ID}"
spec:
  slotsPerWorker: ${GPUS_PER_NODE}
  runPolicy:
    cleanPodPolicy: Running
    ttlSecondsAfterFinished: 600
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        metadata:
          labels:
            app: kubemark-ai
            benchmark: nccl
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          containers:
            - name: launcher
              image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.29.2-1-2276a5e
              env:
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
              command: ["/bin/bash", "-c"]
              args:
                - |
                  echo "========================================================"
                  echo "  kubemark-ai NCCL Full Benchmark Suite"
                  echo "  GPUs: ${TOTAL_GPUS} (${NUM_NODES} nodes x ${GPUS_PER_NODE} GPUs/node)"
                  echo "  GPU Type: ${GPU_TYPE}"
                  echo "  Run ID: ${RUN_ID}"
                  echo "  Start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  echo "========================================================"

                  # NCCL environment tuning:
                  # - NCCL auto-detects topology and optimal settings in most cases
                  # - Override via env vars on the worker pods if needed:
                  #   NCCL_SOCKET_IFNAME: Set if NCCL picks wrong network interface
                  #   NCCL_IB_HCA: Set to mlx5 (or specific HCA) for InfiniBand
                  #   NCCL_NET_GDR_LEVEL: Set to SYS for GPUDirect RDMA across NUMA
                  # - Source: https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html
                  MPI_ARGS="-np ${TOTAL_GPUS} -bind-to none -map-by slot \
                    -x LD_LIBRARY_PATH \
                    -x NCCL_DEBUG=${NCCL_DEBUG:-WARN} \
                    -x NCCL_IB_DISABLE=${NCCL_IB_DISABLE:-0} \
                    -mca btl ^openib -mca btl_tcp_if_exclude lo,docker0"

                  NCCL_ARGS="-b 8 -e 16G -f 2 -g 1 -n 20 -w 5"

                  echo ""
                  echo ">>> [1/5] AllReduce"
                  echo "---"
                  mpirun --allow-run-as-root $MPI_ARGS \
                    /opt/nccl_tests/build/all_reduce_perf $NCCL_ARGS
                  echo ""

                  echo ">>> [2/5] AllGather"
                  echo "---"
                  mpirun --allow-run-as-root $MPI_ARGS \
                    /opt/nccl_tests/build/all_gather_perf $NCCL_ARGS
                  echo ""

                  echo ">>> [3/5] ReduceScatter"
                  echo "---"
                  mpirun --allow-run-as-root $MPI_ARGS \
                    /opt/nccl_tests/build/reduce_scatter_perf $NCCL_ARGS
                  echo ""

                  echo ">>> [4/5] AllToAll"
                  echo "---"
                  mpirun --allow-run-as-root $MPI_ARGS \
                    /opt/nccl_tests/build/alltoall_perf $NCCL_ARGS -d uint8
                  echo ""

                  echo ">>> [5/5] SendRecv"
                  echo "---"
                  mpirun --allow-run-as-root $MPI_ARGS \
                    /opt/nccl_tests/build/sendrecv_perf $NCCL_ARGS -d uint8
                  echo ""

                  echo "========================================================"
                  echo "  Suite complete: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  echo "========================================================"
              resources:
                requests:
                  cpu: "1"
                  memory: 256Mi
    Worker:
      replicas: ${NUM_NODES}
      template:
        metadata:
          labels:
            app: kubemark-ai
            benchmark: nccl
            test: full-suite
            run-id: "${RUN_ID}"
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          containers:
            - name: worker
              image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.29.2-1-2276a5e
              securityContext:
                capabilities:
                  add:
                    - IPC_LOCK
              env:
                - name: NCCL_DEBUG
                  value: "WARN"
              resources:
                requests:
                  nvidia.com/gpu: ${GPUS_PER_NODE}
                limits:
                  nvidia.com/gpu: ${GPUS_PER_NODE}
              volumeMounts:
                - mountPath: /dev/shm
                  name: dshm
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi
