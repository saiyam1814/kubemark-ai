apiVersion: batch/v1
kind: Job
metadata:
  name: train-gpt2-${SHORT_ID}
  namespace: ${NAMESPACE}
  labels:
    app: kubemark-ai
    benchmark: training
    model: gpt2-bench
    run-id: "${RUN_ID}"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: kubemark-ai
        benchmark: training
        model: gpt2-bench
        run-id: "${RUN_ID}"
        training.kubeflow.org/job-role: launcher
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-devel
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "=== kubemark-ai Training Benchmark ==="
              echo "Model: GPT-2 (124M params)"
              echo "GPU Type: ${GPU_TYPE}"
              echo "GPUs: ${TOTAL_GPUS}"
              echo "Run ID: ${RUN_ID}"
              echo "Start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "======================================="

              python3 -u << 'PYTHON_SCRIPT'
              import torch
              import torch.nn as nn
              import time
              import os
              import math

              # GPT-2 config (124M params — fits any GPU with 8GB+ VRAM)
              VOCAB_SIZE = 50257
              N_LAYER = 12
              N_HEAD = 12
              N_EMBD = 768
              SEQ_LEN = 512
              BATCH_SIZE = 8
              WARMUP_STEPS = 5
              MEASURE_STEPS = 20

              class GPT2Block(nn.Module):
                  def __init__(self, n_embd, n_head):
                      super().__init__()
                      self.ln1 = nn.LayerNorm(n_embd)
                      self.attn = nn.MultiheadAttention(n_embd, n_head, batch_first=True)
                      self.ln2 = nn.LayerNorm(n_embd)
                      self.mlp = nn.Sequential(
                          nn.Linear(n_embd, 4 * n_embd),
                          nn.GELU(),
                          nn.Linear(4 * n_embd, n_embd),
                      )

                  def forward(self, x):
                      # Self-attention with causal mask
                      seq_len = x.size(1)
                      mask = torch.triu(torch.ones(seq_len, seq_len, device=x.device), diagonal=1).bool()
                      attn_out, _ = self.attn(self.ln1(x), self.ln1(x), self.ln1(x), attn_mask=mask)
                      x = x + attn_out
                      x = x + self.mlp(self.ln2(x))
                      return x

              class GPT2Model(nn.Module):
                  def __init__(self):
                      super().__init__()
                      self.tok_emb = nn.Embedding(VOCAB_SIZE, N_EMBD)
                      self.pos_emb = nn.Embedding(SEQ_LEN, N_EMBD)
                      self.blocks = nn.Sequential(*[GPT2Block(N_EMBD, N_HEAD) for _ in range(N_LAYER)])
                      self.ln_f = nn.LayerNorm(N_EMBD)
                      self.head = nn.Linear(N_EMBD, VOCAB_SIZE, bias=False)

                  def forward(self, input_ids):
                      B, T = input_ids.shape
                      tok = self.tok_emb(input_ids)
                      pos = self.pos_emb(torch.arange(T, device=input_ids.device))
                      x = self.blocks(tok + pos)
                      x = self.ln_f(x)
                      logits = self.head(x)
                      return logits

              # Setup
              device = torch.device('cuda')
              print(f"\nGPU: {torch.cuda.get_device_name(0)}")
              print(f"VRAM: {torch.cuda.get_device_properties(0).total_memory / 1e9:.1f} GB")
              print(f"CUDA: {torch.version.cuda}")
              print(f"PyTorch: {torch.__version__}")

              model = GPT2Model().to(device)
              params = sum(p.numel() for p in model.parameters())
              print(f"Model parameters: {params:,} ({params/1e6:.1f}M)")
              print(f"Batch size: {BATCH_SIZE}, Seq length: {SEQ_LEN}")
              print(f"Tokens per step: {BATCH_SIZE * SEQ_LEN:,}")
              print()

              optimizer = torch.optim.AdamW(model.parameters(), lr=3e-4, betas=(0.9, 0.95))
              loss_fn = nn.CrossEntropyLoss()

              # Warmup
              print(f"Running {WARMUP_STEPS} warmup steps...")
              for i in range(WARMUP_STEPS):
                  input_ids = torch.randint(0, VOCAB_SIZE, (BATCH_SIZE, SEQ_LEN), device=device)
                  logits = model(input_ids)
                  loss = loss_fn(logits.view(-1, VOCAB_SIZE), input_ids.view(-1))
                  loss.backward()
                  optimizer.step()
                  optimizer.zero_grad()

              # Measure
              print(f"Running {MEASURE_STEPS} measured steps...")
              print()
              times = []
              losses = []
              for i in range(MEASURE_STEPS):
                  torch.cuda.synchronize()
                  start = time.time()

                  input_ids = torch.randint(0, VOCAB_SIZE, (BATCH_SIZE, SEQ_LEN), device=device)
                  logits = model(input_ids)
                  loss = loss_fn(logits.view(-1, VOCAB_SIZE), input_ids.view(-1))
                  loss.backward()
                  optimizer.step()
                  optimizer.zero_grad()

                  torch.cuda.synchronize()
                  elapsed_ms = (time.time() - start) * 1000
                  times.append(elapsed_ms)
                  losses.append(loss.item())

                  # NVIDIA-compatible output format (parsed by parse-results.sh)
                  tokens_per_sec = (BATCH_SIZE * SEQ_LEN) / (elapsed_ms / 1000)
                  # 6 * params * tokens_per_step for forward + backward (approx)
                  flops = 6 * params * BATCH_SIZE * SEQ_LEN
                  tflops = flops / (elapsed_ms / 1000) / 1e12
                  print(f"step {WARMUP_STEPS + i}: elapsed time per iteration (ms): {elapsed_ms:.2f} | "
                        f"loss: {loss.item():.4f} | "
                        f"{tflops:.2f} MODEL_TFLOP/s/GPU | "
                        f"tokens/sec: {tokens_per_sec:.0f}")

              # Summary
              avg_time = sum(times) / len(times)
              std_time = (sum((t - avg_time)**2 for t in times) / len(times)) ** 0.5
              avg_tflops = 6 * params * BATCH_SIZE * SEQ_LEN / (avg_time / 1000) / 1e12
              avg_tokens = BATCH_SIZE * SEQ_LEN / (avg_time / 1000)
              peak_mem = torch.cuda.max_memory_allocated() / 1e9

              print()
              print("=" * 60)
              print(f"Training Benchmark Summary")
              print(f"  Model:           GPT-2 (124M)")
              print(f"  Avg step time:   {avg_time:.2f} ms (std: {std_time:.2f})")
              print(f"  Avg TFLOPS/GPU:  {avg_tflops:.2f}")
              print(f"  Avg tokens/sec:  {avg_tokens:.0f}")
              print(f"  Peak GPU memory: {peak_mem:.2f} GB")
              print(f"  Final loss:      {losses[-1]:.4f}")
              print("=" * 60)
              PYTHON_SCRIPT

              echo "======================================="
              echo "End: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          resources:
            requests:
              nvidia.com/gpu: ${GPUS_PER_NODE}
            limits:
              nvidia.com/gpu: ${GPUS_PER_NODE}
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
