apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-ar-${SHORT_ID}
  namespace: ${NAMESPACE}
  labels:
    app: kubemark-ai
    benchmark: nccl
    test: all-reduce
    run-id: "${RUN_ID}"
spec:
  slotsPerWorker: ${GPUS_PER_NODE}
  runPolicy:
    cleanPodPolicy: Running
    ttlSecondsAfterFinished: 600
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        metadata:
          labels:
            app: kubemark-ai
            benchmark: nccl
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          containers:
            - name: launcher
              image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.29.2-1-2276a5e
              env:
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
              command: ["/bin/bash", "-c"]
              args:
                - |
                  echo "=== kubemark-ai NCCL AllReduce Benchmark ==="
                  echo "GPUs: ${TOTAL_GPUS} (${NUM_NODES} nodes x ${GPUS_PER_NODE} GPUs/node)"
                  echo "GPU Type: ${GPU_TYPE}"
                  echo "Run ID: ${RUN_ID}"
                  echo "Start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  echo "========================================"

                  # NCCL environment tuning:
                  # - NCCL auto-detects topology and optimal settings in most cases
                  # - Override via env vars on the worker pods if needed:
                  #   NCCL_SOCKET_IFNAME: Set if NCCL picks wrong network interface
                  #   NCCL_IB_HCA: Set to mlx5 (or specific HCA) for InfiniBand
                  #   NCCL_NET_GDR_LEVEL: Set to SYS for GPUDirect RDMA across NUMA
                  # - Source: https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/env.html
                  mpirun \
                    --allow-run-as-root \
                    -np ${TOTAL_GPUS} \
                    -bind-to none \
                    -map-by slot \
                    -x LD_LIBRARY_PATH \
                    -x NCCL_DEBUG=${NCCL_DEBUG:-WARN} \
                    -x NCCL_IB_DISABLE=${NCCL_IB_DISABLE:-0} \
                    -mca btl ^openib \
                    -mca btl_tcp_if_exclude lo,docker0 \
                    /opt/nccl_tests/build/all_reduce_perf \
                      -b 8 \
                      -e 16G \
                      -f 2 \
                      -g 1 \
                      -n 20 \
                      -w 5

                  echo "========================================"
                  echo "End: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              resources:
                requests:
                  cpu: "1"
                  memory: 256Mi
    Worker:
      replicas: ${NUM_NODES}
      template:
        metadata:
          labels:
            app: kubemark-ai
            benchmark: nccl
            test: all-reduce
            run-id: "${RUN_ID}"
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          containers:
            - name: worker
              image: ghcr.io/coreweave/nccl-tests:12.9.1-devel-ubuntu22.04-nccl2.29.2-1-2276a5e
              securityContext:
                capabilities:
                  add:
                    - IPC_LOCK
              env:
                - name: NCCL_DEBUG
                  value: "WARN"
              resources:
                requests:
                  nvidia.com/gpu: ${GPUS_PER_NODE}
                limits:
                  nvidia.com/gpu: ${GPUS_PER_NODE}
              volumeMounts:
                - mountPath: /dev/shm
                  name: dshm
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi
