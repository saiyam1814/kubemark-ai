# kubemark-ai: HuggingFace token for gated model access
#
# Required for training benchmarks that download model weights (Qwen3, Llama 3.1).
# NCCL benchmarks don't need this.
#
# Usage:
#   kubectl create secret generic hf-token \
#     --from-literal=token="YOUR_HF_TOKEN" \
#     -n <namespace>
#
# Get your token at: https://huggingface.co/settings/tokens
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: ${NAMESPACE}
type: Opaque
stringData:
  token: <your-hf-token>
