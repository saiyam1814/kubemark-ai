# kubemark-ai: NGC registry authentication
#
# Create this secret to pull NVIDIA NeMo container images for training benchmarks.
# NCCL benchmarks don't need this (they use public CoreWeave images).
#
# Usage:
#   kubectl create secret docker-registry ngc-secret \
#     --docker-server=nvcr.io \
#     --docker-username='$oauthtoken' \
#     --docker-password="YOUR_NGC_API_KEY" \
#     -n <namespace>
#
# Get your NGC API key at: https://ngc.nvidia.com/setup/api-key
apiVersion: v1
kind: Secret
metadata:
  name: ngc-secret
  namespace: ${NAMESPACE}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-encoded-docker-config>
